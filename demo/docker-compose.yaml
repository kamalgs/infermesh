services:
  # === NATS Infrastructure ===

  nats-hub:
    image: nats:2-alpine
    volumes:
      - ./nats-hub.conf:/etc/nats/nats.conf
    command: ["--config", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10

  nats-leaf-client:
    image: nats:2-alpine
    ports:
      - "14225:4225"
    volumes:
      - ./nats-leaf-client.conf:/etc/nats/nats.conf
    command: ["--config", "/etc/nats/nats.conf"]
    depends_on:
      nats-hub:
        condition: service_healthy

  nats-leaf-edge:
    image: nats:2-alpine
    volumes:
      - ./nats-leaf-edge.conf:/etc/nats/nats.conf
    command: ["--config", "/etc/nats/nats.conf"]
    depends_on:
      nats-hub:
        condition: service_healthy

  # === LLM Backend (Ollama on CPU) ===

  llm:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        while ! ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull qwen2.5:0.5b
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q qwen2.5"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 5s

  # === Application Services ===

  provider-ollama:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    entrypoint: ["provider"]
    environment:
      PROVIDER_NAME: ollama
      PROVIDER_CONFIG: /etc/infermesh/demo.yaml
      NATS_URL: "nats://nats-leaf-edge:4224"
      OLLAMA_BASE_URL: "http://llm:11434"
    depends_on:
      nats-leaf-edge:
        condition: service_started
      llm:
        condition: service_healthy

volumes:
  ollama-models:
